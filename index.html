<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YBM-1 | 에듀케레 영어 분석지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --gold: #c8a84b;
    --gold-light: #f0dfa0;
    --bg: #f5f3ee;
    --white: #ffffff;
    --sidebar-w: 260px;
    --accent: #2a4a8a;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #ddd8cc;
    --green: #2d6a4f;
    --green-light: #d8f3dc;
    --red: #c0392b;
    --red-light: #fde8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--navy);
    color: #e8e0d0;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 100;
    border-right: 3px solid var(--gold);
  }
  .sidebar-header {
    padding: 24px 18px 16px;
    border-bottom: 1px solid rgba(200,168,75,0.3);
  }
  .sidebar-brand { font-family:'Playfair Display',serif; font-size:13px; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
  .sidebar-title { font-size:22px; font-weight:700; color:#fff; font-family:'Playfair Display',serif; }
  .sidebar-sub { font-size:11px; color:rgba(200,168,75,0.7); margin-top:4px; }
  .sidebar-section { padding:12px 10px 6px 18px; font-size:10px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; opacity:0.7; font-weight:700; }
  .passage-btn {
    display:block; width:100%; text-align:left; background:none; border:none;
    color:#c8c0b0; padding:10px 18px; font-size:12px; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; border-left:3px solid transparent; transition:all 0.2s; line-height:1.4;
  }
  .passage-btn:hover { background:rgba(200,168,75,0.1); color:#fff; }
  .passage-btn.active { background:rgba(200,168,75,0.15); border-left-color:var(--gold); color:var(--gold); font-weight:700; }
  .passage-btn .p-num { font-size:10px; opacity:0.6; display:block; margin-bottom:2px; }

  /* MAIN */
  #main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }

  /* TABS */
  #tab-bar {
    background:var(--navy); display:flex; overflow-x:auto; padding:0 20px;
    position:sticky; top:0; z-index:90; border-bottom:3px solid var(--gold); gap:2px;
  }
  .tab-btn {
    background:none; border:none; color:rgba(255,255,255,0.55); padding:14px 16px 11px;
    font-size:12px; font-family:'Noto Sans KR',sans-serif; font-weight:500; cursor:pointer;
    white-space:nowrap; border-bottom:3px solid transparent; margin-bottom:-3px; transition:all 0.2s;
  }
  .tab-btn:hover { color:rgba(255,255,255,0.85); }
  .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); font-weight:700; }

  /* CONTENT */
  #content { padding:36px 40px; max-width:920px; }

  /* PASSAGE HEADER */
  .passage-header { margin-bottom:28px; border-left:5px solid var(--gold); padding-left:16px; }
  .passage-header .label { font-size:11px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; font-weight:700; margin-bottom:4px; }
  .passage-header h1 { font-family:'Playfair Display',serif; font-size:26px; color:var(--navy); font-weight:900; line-height:1.2; }
  .passage-header .author { font-size:13px; color:var(--muted); margin-top:6px; font-style:italic; font-family:'EB Garamond',serif; }

  /* FULL TEXT */
  .full-text-box {
    background:var(--white); border:2px solid var(--navy); border-left:6px solid var(--gold);
    border-radius:4px; padding:24px 28px; margin-bottom:32px;
    font-family:'EB Garamond',serif; font-size:17px; line-height:1.9; color:var(--text);
  }
  .full-text-box p { margin-bottom:12px; }
  .full-text-box p:last-child { margin-bottom:0; }

  /* SECTION TITLE */
  .section-title {
    font-family:'Playfair Display',serif; font-size:18px; color:var(--navy); font-weight:700;
    margin-bottom:20px; padding-bottom:8px; border-bottom:2px solid var(--gold);
    display:flex; align-items:center; gap:10px;
  }
  .section-title .icon {
    width:28px; height:28px; background:var(--navy); color:var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;
  }

  /* SENTENCE ANALYSIS */
  .sentence-block { margin-bottom:28px; padding-bottom:28px; border-bottom:1px dashed var(--border); }
  .sentence-block:last-child { border-bottom:none; }
  .sent-num {
    display:inline-block; width:26px; height:26px; background:var(--navy); color:var(--gold);
    border-radius:50%; font-size:12px; font-weight:700; text-align:center; line-height:26px;
    margin-bottom:10px; font-family:'EB Garamond',serif;
  }
  .eng-box {
    background:#fafafa; border:1px solid #ccc; border-left:4px solid var(--accent);
    border-radius:3px; padding:12px 16px; font-family:'EB Garamond',serif; font-size:16px;
    line-height:1.7; color:var(--text); margin-bottom:10px;
  }
  .jikdok { padding:8px 16px; font-size:13px; color:#444; line-height:1.8; margin-bottom:10px; }
  .jikdok .eng-part { color:var(--accent); font-family:'EB Garamond',serif; font-style:italic; }
  .jikdok .kor-part { color:#555; display:block; font-size:12px; margin-top:2px; padding-left:8px; border-left:2px solid var(--gold-light); }
  .grammar-bullets { margin-top:8px; }
  .grammar-item { background:#fffdf5; border:1px solid #ede8d0; border-radius:4px; padding:8px 14px; margin-bottom:6px; font-size:12px; line-height:1.7; }
  .grammar-item .g-name { color:var(--navy); font-weight:700; }
  .grammar-item .g-ex { color:var(--accent); font-family:'EB Garamond',serif; font-style:italic; }
  .grammar-item .g-point { color:#7a5c00; }

  /* VOCAB */
  .vocab-item { display:flex; align-items:baseline; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); font-size:13px; flex-wrap:wrap; }
  .vocab-item:nth-child(odd) { background:#fafaf7; }
  .vocab-word { font-family:'EB Garamond',serif; font-size:16px; font-weight:700; color:var(--navy); min-width:160px; }
  .vocab-meaning { color:var(--text); flex:1; min-width:120px; }
  .vocab-pos { color:var(--gold); font-size:11px; font-style:italic; min-width:55px; }
  .vocab-deriv { color:var(--muted); font-size:11px; font-family:'EB Garamond',serif; flex:1; }

  /* TRANSLATION */
  .translation-text { background:var(--white); border-radius:6px; padding:24px 28px; font-size:14px; line-height:2.1; color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.05); border-left:4px solid var(--gold); }

  /* TOPIC */
  .topic-card { background:var(--white); border-radius:8px; padding:20px 24px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .topic-label { font-size:11px; font-weight:700; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .topic-content { font-size:14px; line-height:1.8; color:var(--text); }
  .flow-steps { display:flex; gap:0; margin-top:8px; flex-wrap:wrap; }
  .flow-step { background:var(--navy); color:#fff; padding:8px 14px; font-size:12px; position:relative; margin-bottom:6px; line-height:1.5; }
  .flow-step:not(:last-child)::after { content:'▶'; position:absolute; right:-14px; top:50%; transform:translateY(-50%); color:var(--gold); font-size:12px; z-index:1; }
  .flow-step:not(:first-child) { margin-left:16px; }

  /* QUIZ */
  .quiz-item { background:var(--white); border-radius:8px; padding:24px; margin-bottom:24px; box-shadow:0 1px 6px rgba(0,0,0,0.07); border-top:3px solid var(--navy); }
  .quiz-q { font-size:14px; font-weight:700; color:var(--navy); margin-bottom:6px; line-height:1.7; white-space:pre-line; }
  .quiz-passage { font-family:'EB Garamond',serif; font-size:14px; line-height:1.8; background:#f8f8f6; border:1px solid #e0ddd5; border-radius:4px; padding:12px 16px; margin:10px 0; color:#333; }
  .quiz-options { margin-top:12px; }
  .quiz-option {
    display:block; width:100%; text-align:left; background:#f9f9f7; border:1.5px solid #e0ddd5;
    border-radius:5px; padding:10px 16px; margin-bottom:8px; font-size:13px;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all 0.15s; color:var(--text);
  }
  .quiz-option:hover:not([disabled]) { border-color:var(--navy); background:#f0f0ff; }
  .quiz-option.correct { background:var(--green-light); border-color:var(--green); color:var(--green); font-weight:700; }
  .quiz-option.wrong { background:var(--red-light); border-color:var(--red); color:var(--red); }
  .quiz-explanation { display:none; margin-top:12px; padding:10px 14px; background:#f0f7ff; border-left:3px solid var(--accent); font-size:12px; line-height:1.7; color:#2c3e6b; border-radius:0 4px 4px 0; }
  .quiz-explanation.show { display:block; }
  .quiz-reset { margin-top:10px; background:none; border:1.5px solid var(--navy); border-radius:4px; padding:6px 16px; font-size:12px; cursor:pointer; color:var(--navy); font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; display:none; }
  .quiz-reset:hover { background:var(--navy); color:#fff; }
  .quiz-reset.show { display:inline-block; }

  /* WRITTEN */
  .written-q { background:var(--white); border-radius:8px; padding:24px; margin-bottom:24px; box-shadow:0 1px 6px rgba(0,0,0,0.07); border-top:3px solid var(--gold); }
  .written-q .wq-title { font-size:14px; font-weight:700; color:var(--navy); margin-bottom:6px; }
  .written-q .wq-cond { font-size:12px; color:var(--muted); margin-bottom:12px; font-style:italic; }
  .written-q textarea { width:100%; min-height:90px; border:1.5px solid var(--border); border-radius:4px; padding:10px 14px; font-family:'Noto Sans KR',sans-serif; font-size:13px; resize:vertical; color:var(--text); background:#fafafa; outline:none; transition:border 0.2s; }
  .written-q textarea:focus { border-color:var(--navy); background:#fff; }
  .check-answer-btn { margin-top:10px; background:var(--navy); border:none; border-radius:4px; padding:8px 20px; font-size:12px; cursor:pointer; color:var(--gold); font-family:'Noto Sans KR',sans-serif; font-weight:700; transition:all 0.15s; }
  .check-answer-btn:hover { background:var(--accent); }
  .model-answer { display:none; margin-top:12px; padding:12px 16px; background:#f0fff4; border-left:3px solid var(--green); font-size:13px; line-height:1.8; color:var(--green); border-radius:0 4px 4px 0; }
  .model-answer.show { display:block; }
  .model-answer .ma-label { font-weight:700; font-size:11px; letter-spacing:1px; margin-bottom:4px; }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(200,168,75,0.4); border-radius:3px; }

  @media (max-width:768px) {
    :root { --sidebar-w:220px; }
    #content { padding:20px 18px; }
    .tab-btn { padding:12px 10px; font-size:11px; }
  }
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">에듀케레 영수학원</div>
    <div class="sidebar-title">YBM-1</div>
    <div class="sidebar-sub">The Magic of Morning Pages</div>
  </div>
  <div class="sidebar-section">지문 선택</div>
  <button class="passage-btn active" onclick="selectPassage(0)">
    <span class="p-num">Passage 1</span>
    The Magic of Morning Pages
  </button>
  <button class="passage-btn" onclick="selectPassage(1)">

  </button>
</nav>

<div id="main">
  <div id="tab-bar">
    <button class="tab-btn active" onclick="selectTab('full-text')">① 전문</button>
    <button class="tab-btn" onclick="selectTab('analysis')">② 문장분석</button>
    <button class="tab-btn" onclick="selectTab('vocab')">③ 핵심단어</button>
    <button class="tab-btn" onclick="selectTab('translation')">④ 전문해석</button>
    <button class="tab-btn" onclick="selectTab('topic')">⑤ 주제·요지</button>
    <button class="tab-btn" onclick="selectTab('quiz')">⑥ 변형문제</button>
  </div>
  <div id="content"></div>
</div>

<script>
const passages = [

/* ══════════════════════════════════════
   PASSAGE 0 — The Magic of Morning Pages
══════════════════════════════════════ */
{
  id:'p0', num:'Passage 1',
  title:'The Magic of Morning Pages',
  author:'Regan · Good Habits Podcast Host',
  fullText:[
    `Welcome to my channel Good Habits! This is Regan, your podcast host. Today, I'm going to talk about a way of starting the day that many people, including me, find enormously useful. It's a kind of journaling called "the morning pages." There is no age at which it is too late to form this habit. I started eight years ago as a high school student, and that's why today's episode is especially for my teenage subscribers.`,
    `The morning pages are three pages of "free writing," ideally done first thing in the morning. The concept is simple. Get up every morning, pick up a pen and a notebook, and write whatever crosses your mind until you have filled three pages. The technique was originally developed to help writers and artists overcome a loss of creativity, but anybody can use it to create a better life.`,
    `There is no right or wrong way to write your morning pages, but there are two rules. First, don't judge your writing as good or bad. These pages are meant to be a "brain cleansing," so don't worry about writing correctly. Second, keep your writing completely private. It is important for you to write freely and honestly. You're even advised not to read your writing yourself for weeks.`
  ],
  sentences:[
    {
      eng:`Welcome to my channel Good Habits! This is Regan, your podcast host.`,
      jikdok:[
        {e:`Welcome to / my channel Good Habits!`, k:`환영합니다 / 저의 채널 Good Habits에!`},
        {e:`This is Regan, / your podcast host.`, k:`저는 Regan이고 / 여러분의 팟캐스트 진행자입니다.`}
      ],
      grammar:[
        {name:`Welcome to + 명사구 (환영 표현)`, ex:`Welcome to my channel Good Habits`, point:`'~에 오신 것을 환영합니다' 관용 표현. 글·방송 도입부 인사로 수능 독해 첫 문장으로 빈출.`},
        {name:`동격 명사 (Regan, your podcast host)`, ex:`This is Regan, your podcast host`, point:`쉼표(,) 뒤 명사가 앞 명사를 동격으로 설명. Regan = your podcast host.`}
      ]
    },
    {
      eng:`Today, I'm going to talk about a way of starting the day that many people, including me, find enormously useful.`,
      jikdok:[
        {e:`Today, / I'm going to talk about / a way of starting the day`, k:`오늘 / 저는 이야기할 것입니다 / 하루를 시작하는 방법에 대해`},
        {e:`that many people, including me, / find enormously useful.`, k:`많은 사람들이, 저를 포함해 / 매우 유용하다고 느끼는.`}
      ],
      grammar:[
        {name:`관계대명사 that (목적격)`, ex:`a way of starting the day that many people find enormously useful`, point:`선행사 a way를 수식하는 목적격 관계대명사 that. find + 목적어 + 형용사(보어) 5형식 구조.`},
        {name:`find + 목적어 + 형용사 (5형식)`, ex:`find enormously useful`, point:`관계절 안의 5형식. 관계대명사 that이 목적어 역할. find A B = 'A를 B라고 생각하다'.`}
      ]
    },
    {
      eng:`It's a kind of journaling called "the morning pages."`,
      jikdok:[
        {e:`It's a kind of journaling / called "the morning pages."`, k:`그것은 일종의 저널링입니다 / "모닝 페이지"라고 불리는.`}
      ],
      grammar:[
        {name:`과거분사구 후치 수식 (called ~)`, ex:`a kind of journaling called "the morning pages"`, point:`명사 뒤에 과거분사구가 와서 명사를 수식. called = which is called의 축약. 수능 어법 빈출.`}
      ]
    },
    {
      eng:`There is no age at which it is too late to form this habit.`,
      jikdok:[
        {e:`There is no age / at which / it is too late / to form this habit.`, k:`어떤 나이도 없습니다 / 그 나이에 / 너무 늦은 / 이 습관을 형성하기에.`}
      ],
      grammar:[
        {name:`전치사 + 관계대명사 (at which)`, ex:`no age at which it is too late`, point:`'전치사 + 관계대명사' 구조. at which = when. 전치사 앞에 오면 that 사용 불가(at that ×).`},
        {name:`가주어 it + 진주어 to부정사`, ex:`it is too late to form this habit`, point:`it은 가주어, to form this habit이 진주어. too ~ to V = '너무 ~해서 …할 수 없다'가 아닌 '…하기에 너무 ~한' 구조.`}
      ]
    },
    {
      eng:`I started eight years ago as a high school student, and that's why today's episode is especially for my teenage subscribers.`,
      jikdok:[
        {e:`I started eight years ago / as a high school student,`, k:`저는 8년 전에 시작했습니다 / 고등학생으로서,`},
        {e:`and that's why / today's episode is especially for / my teenage subscribers.`, k:`그리고 그것이 바로 이유입니다 / 오늘의 에피소드가 특히 ~을 위한 / 저의 십 대 구독자들.`}
      ],
      grammar:[
        {name:`That's why ~ (결과 관계부사절)`, ex:`that's why today's episode is especially for my teenage subscribers`, point:`That is why + 결과절. 앞 내용의 결과를 이끔. That's because(원인)와 혼동 금지.`}
      ]
    },
    {
      eng:`The morning pages are three pages of "free writing," ideally done first thing in the morning.`,
      jikdok:[
        {e:`The morning pages are / three pages of "free writing,"`, k:`모닝 페이지는 / "자유 글쓰기"의 세 페이지이고,`},
        {e:`ideally done / first thing in the morning.`, k:`이상적으로는 하는 것입니다 / 아침에 가장 먼저.`}
      ],
      grammar:[
        {name:`과거분사구 후치 수식 (done ~)`, ex:`three pages of "free writing," ideally done first thing in the morning`, point:`done은 과거분사로 앞 명사구(three pages of "free writing")를 후치 수식. ideally는 부사로 done 수식.`}
      ]
    },
    {
      eng:`The concept is simple.`,
      jikdok:[
        {e:`The concept is simple.`, k:`개념은 간단합니다.`}
      ],
      grammar:[
        {name:`2형식 주격보어 (simple)`, ex:`The concept is simple`, point:`be동사 + 형용사 보어. 2형식 문장. 앞 내용을 요약하는 핵심 문장으로 담화 표지 기능.`}
      ]
    },
    {
      eng:`Get up every morning, pick up a pen and a notebook, and write whatever crosses your mind until you have filled three pages.`,
      jikdok:[
        {e:`Get up every morning, / pick up a pen and a notebook,`, k:`매일 아침 일어나 / 펜과 공책을 집어 들고,`},
        {e:`and write / whatever crosses your mind / until you have filled three pages.`, k:`그리고 쓰세요 / 마음속에 떠오르는 무엇이든 / 세 페이지를 채울 때까지.`}
      ],
      grammar:[
        {name:`명령문 병렬 (Get up / pick up / write)`, ex:`Get up ~ pick up ~ and write`, point:`동사원형 3개 병렬 명령문. and로 마지막 동작 연결. 순서에 따른 행동 지시.`},
        {name:`복합관계대명사 whatever (명사절)`, ex:`write whatever crosses your mind`, point:`whatever = anything that. 동사 write의 목적어 명사절. '~하는 무엇이든'.`},
        {name:`시간 부사절 (until + 현재완료)`, ex:`until you have filled three pages`, point:`until절에서 미래 완료 상황을 현재완료(have filled)로 표현. 완료의 의미 강조.`}
      ]
    },
    {

이제 고등학교 2학년 Yuna의 이야기를 들어보겠습니다. "작년에 이 활동을 시작했을 때, 저는 단순히 이런 무작위적인 생각들을 적었습니다: '졸립다. 약간 두통이 시작되고 있다. 오늘 수학 과제를 끝내야 한다… 이제 뭘 더 써야 할지 모르겠다.' 하지만 곧 점점 더 깊은 생각들이 생겼습니다. 이제는 보통 오늘의 과제나 걱정에 대해 쓰며 시작합니다. 그 후에는 꿈과 그것을 향해 나아가는 방법에 대해 씁니다. 훌륭한 계획과 하루를 시작하기 위한 뚜렷한 목적 의식이 종종 떠오릅니다. 가장 중요한 것은, 이전보다 훨씬 더 행복해졌다는 것입니다."`,

    {title:`4. come to + 동사원형 (점차 ~하게 되다)`,body:`'I came to know what I truly wanted'에서 come to V는 '점차 ~하게 되다'로 점진적 변화나 깨달음을 표현한다. get to V와 유사한 표현.`,point:`★ 출제포인트: come to V(점차 ~)와 come ~ing(~하며 오다) 구별. 빈칸에 to know / to realize 등 빈출.`},
    {title:`5. 현재완료 결과·계속 용법`,body:`'I've also published a book'(결과)와 'have given me the drive and ideas'(계속)에서 현재완료가 과거 행위의 현재 결과, 또는 지속을 나타낸다.`,point:`★ 출제포인트: 현재완료 4가지 용법(경험/완료/결과/계속) 구별. since/for/already/ever/never 등 함께 나오는 부사와 함께 파악.`}
  ],
  translation:`저는 이 두 사람에게 완전히 공감할 수 있습니다. 그들의 경험이 제 것과 비슷하기 때문입니다. Yuna처럼 저도 고등학교 1학년 때 이 저널링을 시작했습니다. 당시에 저는 길을 잃고 스트레스받으며 미래에 대해 불확실했고, 집중하는 것이 쉽지 않았습니다. 처음 매일 세 페이지 쓰기를 시도했을 때 계속할 수 있을 거라고 기대하지 않았습니다. 하지만 저는 해냈고, 그것이 제 삶을 바꿨습니다!

매일 아침 감정을 종이에 풀어내는 것은 감정적 긴장을 완화하는 데 도움이 되었습니다. 더 많은 내면의 평화를 얻었고, 이것이 학업 성취를 향상시켰습니다. David처럼 저도 많은 질문을 했습니다. 예를 들어, "나는 왜 어제 그렇게 화났을까?", "요즘 왜 모든 것이 덜 재미있을까?" 그 다음에는 더 도전적인 질문들을 제기하기 시작했습니다. "지금 당장 무엇이 나를 더 행복하게 할 수 있을까?", "나의 이상적인 미래는 무엇인가? 그것에 도달할 수 있을까? 어떻게?"

이 질문들에 답하는 것이 제가 어떤 사람인지, 그리고 제 필요, 가치관, 열정, 재능이 무엇인지 보여주었습니다. 더 중요하게도 제가 진정으로 원하는 것을 알게 되었습니다! 작가, 작곡가, 라디오 진행자가 되려는 어린 시절 꿈들이 떠올랐습니다. 점차 막연한 아이디어들이 명확한 계획으로 바뀌었습니다. 몇 년 후, 저는 성공한 팟캐스터이자 브이로거가 되었습니다! 책 한 권과 음악 앨범도 출판했습니다. 여전히 매일 쓰는 모닝 페이지가 이 목표들을 달성하기 위한 추진력과 아이디어를 주었습니다.

친애하는 구독자 여러분, 여러분도 모닝 페이지를 써보시겠어요? 탐험을 시작하기 전까지는 자신이 어떤 창의적 에너지나 아이디어를 가지고 있는지 절대 알 수 없습니다. 하지만 완벽주의자가 되지는 마세요. 며칠을 빠뜨리더라도, 그냥 공책을 열고 다시 시작하세요! 궁극적인 목표는 여러분의 정신 건강을 향상시키고 더 행복하고 더 창의적인 삶을 이끌도록 돕는 것입니다.`,
  topic:{

    gist:`진행자 Regan은 모닝 페이지를 통해 자신의 가치관과 열정을 발견하고 어린 시절 꿈을 이루었다. 완벽주의를 버리고 꾸준히 쓰는 것이 정신 건강과 창의적 삶의 열쇠임을 강조한다.`,

     answer:1,
     explanation:`Regan 자신의 모닝 페이지 경험을 통한 자기 발견과 꿈 실현, 그리고 구독자들에게 완벽주의 없이 실천하도록 권유하는 내용이 글의 핵심이다.`},
    {type:'mc',qnum:2,

     options:[`① to relieving`,`② relieved`,`③ relieve`,`④ to relieved`,`⑤ relieving`],
     answer:2,
     explanation:`help + 동사원형(원형부정사) 또는 to부정사 구조. 'relieve'(원형) 또는 'to relieve' 모두 가능하나 보기에서 원형 relieve가 정답.`},

  written:[

     question:`The ultimate aim of morning pages is to improve your mental health and help you lead a happier, more __(A)__ life. Don't be a __(B)__; if you miss a few days, simply start again.`,
     modelAnswer:`(A) creative  (B) perfectionist`},

     question:``,
     modelAnswer:`① 성공한 팟캐스터 및 브이로거가 되었다. ② 책을 출판했다. ③ 음악 앨범을 발표했다. (추가: 내면의 평화를 얻고 학업 성취가 향상되었다.)`}

/* ══════════════════════════
   STATE & NAV
══════════════════════════ */
let currentPassage = 0;
let currentTab = 'full-text';

function selectPassage(idx) {
  currentPassage = idx;
  document.querySelectorAll('.passage-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderContent();
}
function selectTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes("'"+tab+"'"));
  });
  renderContent();
}

/* ══════════════════════════
   RENDER
══════════════════════════ */
function renderContent() {
  const p = passages[currentPassage];
  const c = document.getElementById('content');
  c.innerHTML = '';
  const header = `<div class="passage-header">
    <div class="label">${p.num} · YBM-1</div>
    <h1>${p.title}</h1>
    <div class="author">${p.author}</div>
  </div>`;
  if (currentTab==='full-text')   c.innerHTML = header + renderFullText(p);
  else if (currentTab==='analysis')    c.innerHTML = header + renderAnalysis(p);
  else if (currentTab==='vocab')       c.innerHTML = header + renderVocab(p);
  else if (currentTab==='translation') c.innerHTML = header + renderTranslation(p);
  else if (currentTab==='topic')       c.innerHTML = header + renderTopic(p);
  else if (currentTab==='quiz')        c.innerHTML = header + renderQuiz(p);
}

function renderFullText(p) {
  return `<div class="section-title"><span class="icon">①</span> 전문</div>
    <div class="full-text-box">${p.fullText.map(t=>`<p>${t}</p>`).join('')}</div>`;
}

function renderAnalysis(p) {
  const C=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳','㉑','㉒','㉓','㉔','㉕'];
  let html = `<div class="section-title"><span class="icon">②</span> 문장분석</div>`;
  p.sentences.forEach((s,i)=>{
    html += `<div class="sentence-block">
      <div class="sent-num">${C[i]||i+1}</div>
      <div class="eng-box">${s.eng}</div>
      <div class="jikdok">`;
    s.jikdok.forEach(j=>{
      html+=`<span class="eng-part">${j.e}</span><span class="kor-part">${j.k}</span>`;
    });
    html+=`</div><div class="grammar-bullets">`;
    s.grammar.forEach(g=>{
      html+=`<div class="grammar-item">
        <span class="g-name">◆ ${g.name}</span><br>
        <span class="g-ex">▶ ${g.ex}</span><br>
        <span class="g-point">★ ${g.point}</span>
      </div>`;
    });
    html+=`</div></div>`;
  });
  return html;
}

function renderVocab(p) {
  let html=`<div class="section-title"><span class="icon">③</span> 핵심단어 및 표현</div>`;
  p.vocab.forEach(v=>{
    html+=`<div class="vocab-item">
      <span class="vocab-word">◆ ${v.word}</span>
      <span class="vocab-meaning">${v.meaning}</span>
      <span class="vocab-pos">${v.pos}</span>
      <span class="vocab-deriv">${v.deriv}</span>
    </div>`;
  });
  return html;
}

function renderTranslation(p) {
  const paras = p.translation.split('\n\n').filter(x=>x.trim());
  return `<div class="section-title"><span class="icon">④</span> 전문해석</div>
    <div class="translation-text">${paras.map(t=>`<p style="margin-bottom:14px">${t}</p>`).join('')}</div>`;
}

function renderTopic(p) {
  const steps = p.topic.flow.map(s=>`<div class="flow-step">${s}</div>`).join('');
  return `<div class="section-title"><span class="icon">⑤</span> 주제·요지·구조</div>
    <div class="topic-card"><div class="topic-label">주제 (Topic)</div><div class="topic-content">${p.topic.subject}</div></div>
    <div class="topic-card"><div class="topic-label">요지 (Main Idea)</div><div class="topic-content">${p.topic.gist}</div></div>
    <div class="topic-card"><div class="topic-label">구조 흐름 (Structure)</div><div class="flow-steps">${steps}</div></div>`;
}

function renderQuiz(p) {
  let html=`<div class="section-title"><span class="icon">⑥</span> 변형문제 & 서술형</div>`;
  p.quiz.forEach((q,qi)=>{
    const qid=`${p.id}_q${qi}`;
    const opts=q.options.map((opt,oi)=>
      `<button class="quiz-option" id="${qid}_o${oi}" onclick="checkAnswer('${qid}',${oi},${q.answer},'${qid}_exp')">${opt}</button>`
    ).join('');
    html+=`<div class="quiz-item">
      <div class="quiz-q">${q.question}</div>
      <div class="quiz-options">${opts}</div>
      <div class="quiz-explanation" id="${qid}_exp">💡 ${q.explanation}</div>
      <button class="quiz-reset" id="${qid}_reset" onclick="resetQuiz('${qid}',${q.options.length})">↺ 다시 풀기</button>
    </div>`;
  });
  p.written.forEach((w,wi)=>{
    const wid=`${p.id}_w${wi}`;
    html+=`<div class="written-q">
      <div class="wq-title">${w.title}</div>
      <div class="wq-cond">📌 조건: ${w.instruction}</div>
      ${w.question?`<div class="quiz-passage">${w.question}</div>`:''}
      <textarea id="${wid}_ta" placeholder="여기에 답안을 작성하세요..."></textarea><br>
      <button class="check-answer-btn" onclick="toggleModel('${wid}_ma')">모범답안 확인</button>
      <div class="model-answer" id="${wid}_ma"><div class="ma-label">✅ 모범답안</div>${w.modelAnswer}</div>
    </div>`;
  });
  return html;
}

function checkAnswer(qid,chosen,correct,expId){
  const opts=document.querySelectorAll(`[id^="${qid}_o"]`);
  opts.forEach(o=>o.disabled=true);
  opts[chosen].classList.add(chosen===correct?'correct':'wrong');
  if(chosen!==correct) opts[correct].classList.add('correct');
  document.getElementById(expId).classList.add('show');
  document.getElementById(qid+'_reset').classList.add('show');
}
function resetQuiz(qid,n){
  for(let i=0;i<n;i++){
    const o=document.getElementById(`${qid}_o${i}`);
    if(o){o.disabled=false;o.classList.remove('correct','wrong');}
  }
  document.getElementById(qid+'_exp').classList.remove('show');
  document.getElementById(qid+'_reset').classList.remove('show');
}
function toggleModel(id){document.getElementById(id).classList.toggle('show');}

renderContent();
</script>
</body>
</html>
